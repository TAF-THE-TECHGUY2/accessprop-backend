services:
  mysql:
    image: mysql:8.4
    container_name: access_properties_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: access_properties
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
